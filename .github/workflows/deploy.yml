name: CI-CD Deploy to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: devopsacr1234567
  IMAGE_NAME: backend
  RESOURCE_GROUP: devops-rg
  AKS_NAME: devops-aks

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Define image tag
      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # 4. Login to ACR
      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      # 5. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG \
            ./apps/backend

      # 6. Trivy scan (SAFE MODE - never blocks except CRITICAL)
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # 7. Push image to ACR
      - name: Push image to ACR
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

      # 8. Get AKS credentials
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --overwrite-existing

      # 9. Deploy to AKS (FIXED NAME)
      - name: Deploy to AKS
        run: |
          kubectl set image deployment/backend-deployment \
            backend=$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

      # 10. Verify rollout
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend-deployment
